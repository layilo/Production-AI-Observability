groups:
  - name: ai-observability
    rules:
      - alert: AIHighErrorRate
        expr: sum(rate(ai_observability_traces_ingested_total{status!="ok"}[5m])) / sum(rate(ai_observability_traces_ingested_total[5m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: High AI workflow error rate
          description: More than 10% of AI traces are failing over the last 10 minutes.
      - alert: AIHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(ai_observability_trace_duration_ms_bucket[5m])) by (le, workflow_type)) > 5000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: AI workflow latency regression
          description: P95 latency is above 5 seconds for one or more workflow types.
      - alert: AIIncidentBacklog
        expr: sum(ai_observability_active_incidents) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Multiple active AI incidents
          description: The platform is seeing more than 5 active incident traces.
